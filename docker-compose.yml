services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clinical_agent
      POSTGRES_USER: maliki
      POSTGRES_PASSWORD: localdev123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  rag-research:
    build: /mnt/d/rag-research
    ports:
      - '8001:8003'
    volumes:
      - /mnt/d/rag-research/data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: localdev123
    restart: unless-stopped

volumes:
  pgdata:
